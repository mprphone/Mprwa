<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      width: 410px;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      color: #0f172a;
      background: #f8fafc;
    }
    .hero {
      background: linear-gradient(135deg, #050816 0%, #0f172a 54%, #13213f 100%);
      color: white;
      padding: 18px 18px 16px;
      border-bottom: 3px solid #22c55e;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand img {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: white;
      padding: 5px;
      box-shadow: 0 10px 24px rgba(0,0,0,.28);
    }
    h1 { font-size: 22px; margin: 0; line-height: 1.05; letter-spacing: -.03em; }
    .muted { font-size: 12px; color: #cbd5e1; margin-top: 4px; }
    main { padding: 14px 16px 16px; }
    .search {
      width: 100%; border: 1px solid #cbd5e1; border-radius: 14px; padding: 12px 14px;
      font-size: 15px; outline: none; background: white;
    }
    .search:focus { border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56,189,248,.18); }
    .results { margin-top: 10px; max-height: 150px; overflow: auto; border: 1px solid #e2e8f0; border-radius: 14px; background: white; }
    .result { width: 100%; text-align: left; border: 0; border-bottom: 1px solid #f1f5f9; background: white; padding: 10px 12px; cursor: pointer; }
    .result:hover, .result.active { background: #eff6ff; }
    .result strong { display: block; font-size: 13px; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result span { display: block; font-size: 11px; color: #64748b; margin-top: 2px; }
    .card { margin-top: 12px; border: 1px solid #dbeafe; background: white; border-radius: 18px; padding: 14px; box-shadow: 0 8px 24px rgba(15,23,42,.06); }
    .entity { font-size: 16px; font-weight: 900; margin-bottom: 3px; color: #0f172a; }
    .meta { font-size: 12px; color: #475569; margin-bottom: 14px; }
    .access-title { font-size: 13px; color: #334155; margin-bottom: 9px; }
    .buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .access {
      min-height: 82px; border: 1px solid #cbd5e1; border-radius: 18px; padding: 10px 8px;
      background: white; font-weight: 900; cursor: pointer; color: #0f172a;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease;
    }
    .access:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(15,23,42,.12); }
    .access:disabled { opacity: .38; cursor: not-allowed; }
    .icon-img {
      width: 70px; height: 70px; object-fit: contain; display: block;
      filter: drop-shadow(0 5px 10px rgba(15,23,42,.16));
    }
    .access.at { border-color: #bae6fd; background: linear-gradient(180deg, #f0f9ff, #dff3ff); color: #075985; }
    .access.ss { border-color: #bbf7d0; background: linear-gradient(180deg, #f0fdf4, #dcfce7); color: #166534; }
    .access.sub { border-color: #99f6e4; background: linear-gradient(180deg, #ecfeff, #ccfbf1); color: #0f766e; }
    .status { margin-top: 12px; border: 1px solid #e2e8f0; border-radius: 13px; padding: 10px 11px; background: white; font-size: 12px; color: #475569; }
    .error { color: #b91c1c; }
    .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 11px; }
    .link { border: 0; background: transparent; color: #2563eb; font-size: 12px; cursor: pointer; padding: 0; font-weight: 700; }
  </style>
</head>
<body>
  <header class="hero">
    <div class="brand">
      <img src="icons/icon-256.png" alt="WA" />
      <div>
        <h1>WA PRO<br/>Auto Login</h1>
        <div class="muted">Pesquisa cliente e abre acessos</div>
      </div>
    </div>
  </header>
  <main>
    <input id="search" class="search" placeholder="Pesquisar nome, empresa, NIF ou NISS..." autocomplete="off" />
    <div id="results" class="results"></div>
    <section id="selected" class="card" hidden></section>
    <div id="status" class="status">A ler acessos guardados...</div>
    <div class="footer">
      <button id="refresh" class="link">Atualizar acessos</button>
      <button id="openWa" class="link">Abrir WA PRO</button>
    </div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
